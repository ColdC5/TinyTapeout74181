  ui[0]: "d0"
  ui[1]: "d1"
  ui[2]: "d2"
  ui[3]: "d3"
  ui[4]: "q0"
  ui[5]: "q1"
  ui[6]: "q2"
  ui[7]: ""

  # Outputs
  uo[0]: "G or Y"
  uo[1]: "Cn+4"
  uo[2]: "P or X"
  uo[3]: "F3"
  uo[4]: "F2"
  uo[5]: "A = B"
  uo[6]: "F1"
  uo[7]: "F0"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
